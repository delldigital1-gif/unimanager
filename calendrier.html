<!DOCTYPE html>
<html lang="fr">
<head>
<style>html{visibility:hidden}</style>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UniManage — Calendrier Académique</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--navy:#0D1B2A;--blue:#1A56DB;--sky:#3B82F6;--gold:#F59E0B;--light:#F0F4FF;--white:#FFFFFF;--gray:#64748B;--border:#E2E8F0;--success:#10B981;--danger:#EF4444;--purple:#8B5CF6;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:#F8FAFC;color:var(--navy);min-height:100vh;}
    .topbar{position:fixed;top:0;left:0;right:0;height:60px;background:white;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;z-index:100;}
    .topbar-logo{font-family:'Playfair Display',serif;font-weight:800;font-size:1.1rem;color:var(--navy);}
    .topbar-logo span{color:var(--blue);}
    .topbar-right{display:flex;align-items:center;gap:.75rem;}
    .btn-primary{padding:.5rem 1.1rem;border-radius:9px;background:var(--blue);color:white;font-size:.83rem;font-weight:600;cursor:pointer;border:none;transition:all .2s;}
    .btn-primary:hover{background:#1344b8;}
    .btn-outline{padding:.5rem 1.1rem;border-radius:9px;border:1.5px solid var(--border);background:white;color:var(--navy);font-size:.83rem;font-weight:600;cursor:pointer;transition:all .2s;}
    .btn-outline:hover{border-color:var(--blue);color:var(--blue);}
    .back-link{padding:.4rem .9rem;border-radius:8px;border:1px solid var(--border);background:white;font-size:.8rem;font-weight:600;cursor:pointer;color:var(--gray);transition:all .2s;text-decoration:none;}
    .back-link:hover{border-color:var(--blue);color:var(--blue);}
    /* Main layout */
    .main-wrap{padding-top:60px;display:flex;height:100vh;}
    /* Sidebar */
    .cal-sidebar{width:280px;flex-shrink:0;background:white;border-right:1px solid var(--border);padding:1.25rem;overflow-y:auto;}
    .cal-sidebar-title{font-family:'Playfair Display',serif;font-weight:700;font-size:.9rem;margin-bottom:1rem;}
    /* Mini calendar */
    .mini-cal{margin-bottom:1.5rem;}
    .mini-cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;}
    .mini-cal-title{font-family:'Playfair Display',serif;font-weight:700;font-size:.85rem;}
    .mini-cal-nav{background:none;border:none;cursor:pointer;color:var(--gray);font-size:1rem;padding:.2rem .4rem;border-radius:5px;transition:all .2s;}
    .mini-cal-nav:hover{background:var(--light);color:var(--blue);}
    .mini-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:.2rem;text-align:center;}
    .mini-day-head{font-size:.65rem;font-weight:700;color:var(--gray);padding:.3rem 0;}
    .mini-day{font-size:.75rem;padding:.3rem;border-radius:6px;cursor:pointer;transition:all .2s;}
    .mini-day:hover{background:var(--light);}
    .mini-day.today{background:var(--blue);color:white;font-weight:700;}
    .mini-day.has-event{position:relative;}
    .mini-day.has-event::after{content:'';position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--gold);}
    .mini-day.other-month{color:var(--border);}
    .mini-day.selected{background:var(--light);border:1.5px solid var(--blue);color:var(--blue);font-weight:700;}
    /* Event types legend */
    .event-types{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1.5rem;}
    .event-type-item{display:flex;align-items:center;gap:.65rem;padding:.5rem .65rem;border-radius:8px;cursor:pointer;transition:background .2s;}
    .event-type-item:hover{background:#F8FAFC;}
    .event-type-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0;}
    .event-type-label{font-size:.8rem;font-weight:500;}
    .event-type-count{margin-left:auto;font-size:.72rem;font-weight:700;color:var(--gray);}
    /* Upcoming events */
    .upcoming-list{display:flex;flex-direction:column;gap:.6rem;}
    .upcoming-item{padding:.65rem .75rem;border-radius:9px;border-left:3px solid;cursor:pointer;transition:all .2s;}
    .upcoming-item:hover{transform:translateX(3px);}
    .upcoming-date{font-size:.68rem;font-weight:600;color:var(--gray);margin-bottom:.2rem;}
    .upcoming-name{font-size:.8rem;font-weight:600;color:var(--navy);}
    .upcoming-sub{font-size:.7rem;color:var(--gray);margin-top:.1rem;}
    /* Main calendar */
    .cal-main{flex:1;overflow-y:auto;padding:1.5rem;}
    .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
    .cal-title{font-family:'Playfair Display',serif;font-weight:800;font-size:1.2rem;}
    .cal-nav-group{display:flex;align-items:center;gap:.5rem;}
    .cal-nav-btn{padding:.45rem .9rem;border-radius:8px;border:1.5px solid var(--border);background:white;cursor:pointer;font-size:.83rem;font-weight:600;color:var(--navy);transition:all .2s;}
    .cal-nav-btn:hover{border-color:var(--blue);color:var(--blue);}
    .cal-nav-btn.active{background:var(--blue);color:white;border-color:var(--blue);}
    /* Views */
    .cal-view{display:none;}
    .cal-view.active{display:block;}
    /* Month grid */
    .month-grid{border:1px solid var(--border);border-radius:14px;overflow:hidden;background:white;}
    .month-head{display:grid;grid-template-columns:repeat(7,1fr);}
    .month-head-cell{padding:.65rem;text-align:center;font-size:.75rem;font-weight:700;color:var(--gray);background:#F8FAFC;border-bottom:1px solid var(--border);}
    .month-body{display:grid;grid-template-columns:repeat(7,1fr);}
    .month-cell{border-right:1px solid var(--border);border-bottom:1px solid var(--border);min-height:100px;padding:.5rem;cursor:pointer;transition:background .15s;position:relative;}
    .month-cell:nth-child(7n){border-right:none;}
    .month-cell:hover{background:#FAFBFF;}
    .month-cell.today-cell{background:rgba(26,86,219,0.03);}
    .cell-date{font-size:.8rem;font-weight:600;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:.3rem;}
    .today-cell .cell-date{background:var(--blue);color:white;}
    .month-cell.other{background:#FAFBFC;}
    .month-cell.other .cell-date{color:var(--border);}
    .cell-event{font-size:.68rem;font-weight:600;padding:.18rem .45rem;border-radius:4px;margin-bottom:.15rem;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:opacity .2s;}
    .cell-event:hover{opacity:.8;}
    /* Week view */
    .week-grid{background:white;border:1px solid var(--border);border-radius:14px;overflow:hidden;}
    .week-head{display:grid;grid-template-columns:60px repeat(7,1fr);border-bottom:1px solid var(--border);}
    .week-head-cell{padding:.65rem .5rem;text-align:center;font-size:.78rem;border-right:1px solid var(--border);}
    .week-head-cell:last-child{border-right:none;}
    .week-head-day{font-weight:700;color:var(--navy);}
    .week-head-date{font-size:.7rem;color:var(--gray);}
    .week-head-date.today{color:var(--blue);font-weight:700;}
    .week-body{display:grid;grid-template-columns:60px repeat(7,1fr);}
    .week-time{padding:.45rem .5rem;text-align:right;font-size:.68rem;color:var(--gray);border-right:1px solid var(--border);border-bottom:1px solid var(--border);height:60px;display:flex;align-items:flex-start;justify-content:flex-end;}
    .week-slot{border-right:1px solid var(--border);border-bottom:1px solid var(--border);height:60px;padding:.2rem;position:relative;transition:background .15s;}
    .week-slot:hover{background:#FAFBFF;}
    .week-slot:last-child{border-right:none;}
    .slot-event{position:absolute;left:2px;right:2px;top:2px;border-radius:5px;padding:.25rem .4rem;font-size:.68rem;font-weight:600;cursor:pointer;overflow:hidden;}
    /* Event modal */
    .modal-overlay{position:fixed;inset:0;z-index:2000;background:rgba(13,27,42,0.5);display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);padding:1rem;}
    .modal-overlay.active{display:flex;}
    .modal{background:white;border-radius:18px;width:100%;max-width:500px;padding:2rem;position:relative;box-shadow:0 30px 80px rgba(0,0,0,0.2);animation:modalIn .3s ease;}
    @keyframes modalIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .modal-close{position:absolute;top:1rem;right:1rem;background:#F8FAFC;border:none;cursor:pointer;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;color:var(--gray);}
    .modal-title{font-family:'Playfair Display',serif;font-weight:800;font-size:1.1rem;margin-bottom:1.25rem;}
    .form-group{margin-bottom:.85rem;}
    .form-group label{display:block;font-size:.78rem;font-weight:600;color:var(--navy);margin-bottom:.35rem;}
    .form-input{width:100%;padding:.65rem .9rem;border-radius:8px;border:1.5px solid var(--border);font-size:.875rem;font-family:'Inter',sans-serif;color:var(--navy);outline:none;transition:border-color .2s;}
    .form-input:focus{border-color:var(--blue);}
    .form-select{width:100%;padding:.65rem .9rem;border-radius:8px;border:1.5px solid var(--border);font-size:.875rem;font-family:'Inter',sans-serif;outline:none;cursor:pointer;}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:.85rem;}
    .btn-submit{width:100%;padding:.8rem;border-radius:10px;background:var(--blue);color:white;font-size:.9rem;font-weight:700;cursor:pointer;border:none;margin-top:.5rem;}
    /* Event detail popup */
    .event-popup{position:fixed;z-index:3000;background:white;border-radius:12px;padding:1.25rem;width:280px;box-shadow:0 16px 48px rgba(0,0,0,0.18);border:1px solid var(--border);display:none;}
    .event-popup.show{display:block;animation:popIn .2s ease;}
    @keyframes popIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
    .popup-close{float:right;background:none;border:none;cursor:pointer;color:var(--gray);font-size:.85rem;}
    .popup-type-bar{height:4px;border-radius:2px;margin-bottom:.85rem;}
    .popup-title{font-family:'Playfair Display',serif;font-weight:700;font-size:.92rem;margin-bottom:.5rem;}
    .popup-meta{font-size:.78rem;color:var(--gray);display:flex;flex-direction:column;gap:.25rem;}
    .popup-actions{display:flex;gap:.5rem;margin-top:.85rem;}
    .badge{display:inline-block;padding:.22rem .7rem;border-radius:100px;font-size:.7rem;font-weight:600;}
    .toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--navy);color:white;padding:.75rem 1.25rem;border-radius:10px;font-size:.83rem;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,0.2);z-index:9999;opacity:0;transform:translateY(16px);transition:all .3s;pointer-events:none;}
    .toast.show{opacity:1;transform:translateY(0);}
    @media(max-width:800px){.cal-sidebar{display:none;}.cal-main{padding:1rem;}}
  </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="auth-guard.js"></script>
<script>window.authReady = requireAuth();</script>

<header class="topbar">
  <div style="display:flex;align-items:center;gap:1rem">
    <div class="topbar-logo">Uni<span>Manage</span></div>
    <span style="color:var(--border)">·</span>
    <span style="font-family:'Playfair Display',serif;font-weight:700;font-size:.95rem">📆 Calendrier Académique</span>
  </div>
  <div class="topbar-right">
    <a href="dashboard.html" id="backLink" class="back-link">← Dashboard</a>
    <button class="btn-outline" onclick="showToast('📅 Synchronisé avec Google Calendar !')">📅 Sync</button>
    <button class="btn-primary" id="btnAddEvent" style="display:none" onclick="openModal()">+ Événement</button>
  </div>
</header>

<div class="main-wrap">

  <!-- SIDEBAR -->
  <aside class="cal-sidebar">
    <!-- Mini calendar -->
    <div class="mini-cal">
      <div class="mini-cal-header">
        <button class="mini-cal-nav" onclick="changeMonth(-1)">‹</button>
        <div class="mini-cal-title" id="miniCalTitle">Janvier 2025</div>
        <button class="mini-cal-nav" onclick="changeMonth(1)">›</button>
      </div>
      <div class="mini-cal-grid" id="miniCalGrid"></div>
    </div>

    <!-- Event types -->
    <div class="cal-sidebar-title">Types d'événements</div>
    <div class="event-types" id="eventTypesLegend">
      <div class="event-type-item"><div class="event-type-dot" style="background:var(--blue)"></div><span class="event-type-label">Cours</span><span class="event-type-count" data-type="Cours">0</span></div>
      <div class="event-type-item"><div class="event-type-dot" style="background:var(--danger)"></div><span class="event-type-label">Examens</span><span class="event-type-count" data-type="Examen">0</span></div>
      <div class="event-type-item"><div class="event-type-dot" style="background:var(--gold)"></div><span class="event-type-label">TP / TD</span><span class="event-type-count" data-type="TP/TD">0</span></div>
      <div class="event-type-item"><div class="event-type-dot" style="background:var(--success)"></div><span class="event-type-label">Réunions</span><span class="event-type-count" data-type="Réunion">0</span></div>
      <div class="event-type-item"><div class="event-type-dot" style="background:var(--purple)"></div><span class="event-type-label">Événements</span><span class="event-type-count" data-type="Événement">0</span></div>
      <div class="event-type-item"><div class="event-type-dot" style="background:var(--navy)"></div><span class="event-type-label">Vacances</span><span class="event-type-count" data-type="Vacances">0</span></div>
    </div>

    <!-- Upcoming events -->
    <div class="cal-sidebar-title">Prochains événements</div>
    <div class="upcoming-list" id="upcomingList">
      <div style="text-align:center;color:var(--gray);font-size:.78rem;padding:.5rem">Chargement…</div>
    </div>
  </aside>

  <!-- MAIN CALENDAR -->
  <div class="cal-main">
    <div class="cal-header">
      <div style="display:flex;align-items:center;gap:1rem">
        <button class="cal-nav-btn" onclick="changeMainMonth(-1)">‹ Précédent</button>
        <div class="cal-title" id="mainCalTitle">Février 2025</div>
        <button class="cal-nav-btn" onclick="changeMainMonth(1)">Suivant ›</button>
        <button class="cal-nav-btn" onclick="goToday()">Aujourd'hui</button>
      </div>
      <div class="cal-nav-group">
        <button class="cal-nav-btn active" id="btnMonth" onclick="switchView('month')">Mois</button>
        <button class="cal-nav-btn" id="btnWeek" onclick="switchView('week')">Semaine</button>
        <button class="cal-nav-btn" id="btnList" onclick="switchView('list')">Liste</button>
      </div>
    </div>

    <!-- MONTH VIEW -->
    <div class="cal-view active" id="view-month">
      <div class="month-grid">
        <div class="month-head">
          <div class="month-head-cell">Lun</div><div class="month-head-cell">Mar</div><div class="month-head-cell">Mer</div><div class="month-head-cell">Jeu</div><div class="month-head-cell">Ven</div><div class="month-head-cell" style="color:var(--danger)">Sam</div><div class="month-head-cell" style="color:var(--danger)">Dim</div>
        </div>
        <div class="month-body" id="monthBody"></div>
      </div>
    </div>

    <!-- WEEK VIEW -->
    <div class="cal-view" id="view-week">
      <div class="week-grid">
        <div class="week-head">
          <div style="padding:.65rem;border-right:1px solid var(--border);background:#F8FAFC"></div>
          <div class="week-head-cell" style="background:#F8FAFC"><div class="week-head-day">Lun</div><div class="week-head-date" id="whd-0"></div></div>
          <div class="week-head-cell" style="background:#F8FAFC"><div class="week-head-day">Mar</div><div class="week-head-date" id="whd-1"></div></div>
          <div class="week-head-cell" style="background:#F8FAFC"><div class="week-head-day">Mer</div><div class="week-head-date" id="whd-2"></div></div>
          <div class="week-head-cell" style="background:#F8FAFC"><div class="week-head-day">Jeu</div><div class="week-head-date" id="whd-3"></div></div>
          <div class="week-head-cell" style="background:#F8FAFC"><div class="week-head-day">Ven</div><div class="week-head-date" id="whd-4"></div></div>
          <div class="week-head-cell" style="background:#F8FAFC;color:var(--danger)"><div class="week-head-day">Sam</div><div class="week-head-date" id="whd-5"></div></div>
          <div class="week-head-cell" style="background:#F8FAFC;color:var(--danger)"><div class="week-head-day">Dim</div><div class="week-head-date" id="whd-6"></div></div>
        </div>
        <div class="week-body" id="weekBody"></div>
      </div>
    </div>

    <!-- LIST VIEW -->
    <div class="cal-view" id="view-list">
      <div style="background:white;border:1px solid var(--border);border-radius:14px;overflow:hidden">
        <div style="padding:1rem 1.25rem;border-bottom:1px solid var(--border);font-family:'Playfair Display',serif;font-weight:700;font-size:.92rem">Tous les événements — Février 2025</div>
        <div id="listEvents" style="display:flex;flex-direction:column"></div>
      </div>
    </div>
  </div>
</div>

<!-- Event popup -->
<div class="event-popup" id="eventPopup">
  <button class="popup-close" onclick="closePopup()">✕</button>
  <div class="popup-type-bar" id="popupBar"></div>
  <div class="popup-title" id="popupTitle"></div>
  <div class="popup-meta" id="popupMeta"></div>
  <div class="popup-actions" id="popupActions" style="display:none">
    <button style="flex:1;padding:.45rem;border-radius:7px;border:none;background:var(--blue);color:white;font-size:.78rem;font-weight:600;cursor:pointer" onclick="showToast('✏️ Modification à venir')">Modifier</button>
    <button style="padding:.45rem .85rem;border-radius:7px;border:1px solid var(--border);background:white;font-size:.78rem;cursor:pointer" onclick="deleteEvent()">Supprimer</button>
  </div>
</div>

<!-- Modal ajouter événement -->
<div class="modal-overlay" id="eventModal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">📆 Ajouter un événement</div>
    <div id="eventFormError" style="display:none;background:rgba(239,68,68,0.08);color:var(--danger);border:1px solid rgba(239,68,68,0.2);padding:.6rem 1rem;border-radius:8px;font-size:.83rem;margin-bottom:1rem"></div>
    <div class="form-group"><label>Titre de l'événement *</label><input id="ev_titre" class="form-input" placeholder="Ex: Examen Algorithmique L2"/></div>
    <div class="form-group">
      <label>Type *</label>
      <select id="ev_type" class="form-select">
        <option>Cours</option><option>Examen</option><option>TP/TD</option>
        <option>Réunion</option><option>Événement</option><option>Vacances</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Date début *</label><input id="ev_debut" class="form-input" type="date"/></div>
      <div class="form-group"><label>Date fin</label><input id="ev_fin" class="form-input" type="date"/></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Heure début</label><input id="ev_heure_debut" class="form-input" type="time" value="08:00"/></div>
      <div class="form-group"><label>Heure fin</label><input id="ev_heure_fin" class="form-input" type="time" value="10:00"/></div>
    </div>
    <div class="form-group"><label>Lieu / Salle</label><input id="ev_lieu" class="form-input" placeholder="Ex: Amphithéâtre A"/></div>
    <div class="form-group"><label>Concerne</label><input id="ev_audience" class="form-input" placeholder="Ex: Informatique L2, Direction, Tous" value="Tous"/></div>
    <div class="form-group"><label>Description</label><input id="ev_description" class="form-input" placeholder="Informations complémentaires..."/></div>
    <button class="btn-submit" id="ev_submit" onclick="submitEvent()">Créer l'événement →</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── Types d'événements ──
  const TYPE_META = {
    'Cours':      { color:'#1A56DB', bg:'rgba(26,86,219,0.1)',   icon:'📚' },
    'Examen':     { color:'#EF4444', bg:'rgba(239,68,68,0.1)',   icon:'📝' },
    'TP/TD':      { color:'#F59E0B', bg:'rgba(245,158,11,0.1)',  icon:'🔧' },
    'Réunion':    { color:'#10B981', bg:'rgba(16,185,129,0.1)',  icon:'📋' },
    'Événement':  { color:'#8B5CF6', bg:'rgba(139,92,246,0.1)',  icon:'🎓' },
    'Vacances':   { color:'#0D1B2A', bg:'rgba(13,27,42,0.07)',   icon:'🏖️' },
  };

  let me = null;
  let allEvents = [];       // lignes brutes calendar_events
  let eventsByDate = {};    // 'YYYY-MM-DD' -> [{id,title,color,bg,time,type,location,audience,start_time,end_time}]
  let activePopupEventId = null;

  const today = new Date();
  let currentYear = today.getFullYear(), currentMonth = today.getMonth();
  let miniYear = today.getFullYear(), miniMonth = today.getMonth();

  const months=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const days=['L','M','M','J','V','S','D'];

  function pad2(n){ return String(n).padStart(2,'0'); }
  function dateKey(d){ return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
  function fmtHM(t){ return t ? t.slice(0,5).replace(':','h') : ''; }

  // ── Charger les vrais événements (Supabase) ──
  async function loadCalendarEvents() {
    let query = supabaseClient.from('calendar_events').select('*').order('start_date');
    if (me.role !== 'superadmin') query = query.eq('university', me.university);
    const { data, error } = await query;
    if (error) { console.error(error); return; }
    allEvents = data || [];

    eventsByDate = {};
    allEvents.forEach(ev => {
      const meta = TYPE_META[ev.type] || TYPE_META['Événement'];
      const timeLabel = ev.start_time ? `${fmtHM(ev.start_time)}–${fmtHM(ev.end_time)}` : 'Journée';
      let cursor = new Date(ev.start_date + 'T00:00:00');
      const end = new Date(ev.end_date + 'T00:00:00');
      while (cursor <= end) {
        const key = dateKey(cursor);
        (eventsByDate[key] ||= []).push({
          id: ev.id, title: `${meta.icon} ${ev.title}`, color: meta.color, bg: meta.bg,
          time: timeLabel, type: ev.type, location: ev.location, audience: ev.audience,
          start_time: ev.start_time, end_time: ev.end_time
        });
        cursor.setDate(cursor.getDate() + 1);
      }
    });

    renderLegendCounts();
    renderUpcoming();
    renderMiniCal();
    renderMainCal();
    if (document.getElementById('view-week').classList.contains('active')) renderWeek();
  }

  function renderLegendCounts() {
    const counts = {};
    allEvents.forEach(ev => { counts[ev.type] = (counts[ev.type]||0) + 1; });
    document.querySelectorAll('#eventTypesLegend .event-type-count').forEach(el => {
      el.textContent = counts[el.dataset.type] || 0;
    });
  }

  function renderUpcoming() {
    const el = document.getElementById('upcomingList');
    const todayKey = dateKey(new Date());
    const upcoming = allEvents.filter(ev => ev.end_date >= todayKey).sort((a,b) => a.start_date.localeCompare(b.start_date)).slice(0, 5);
    if (upcoming.length === 0) {
      el.innerHTML = '<div style="text-align:center;color:var(--gray);font-size:.78rem;padding:.5rem">Aucun événement à venir.</div>';
      return;
    }
    el.innerHTML = upcoming.map(ev => {
      const meta = TYPE_META[ev.type] || TYPE_META['Événement'];
      const d = new Date(ev.start_date + 'T00:00:00');
      const dateLabel = d.toLocaleDateString('fr-FR', { weekday:'short', day:'2-digit', month:'short', year:'numeric' });
      const timeLabel = ev.start_time ? fmtHM(ev.start_time) : 'Journée';
      return `<div class="upcoming-item" style="background:${meta.bg};border-left-color:${meta.color}" onclick="showEventPopupFor(event,'${ev.id}')">
        <div class="upcoming-date">${dateLabel}</div>
        <div class="upcoming-name">${meta.icon} ${ev.title}</div>
        <div class="upcoming-sub">${timeLabel}${ev.location ? ' · '+ev.location : ''}</div>
      </div>`;
    }).join('');
  }

  function renderMiniCal(){
    const el=document.getElementById('miniCalGrid');
    document.getElementById('miniCalTitle').textContent=months[miniMonth]+' '+miniYear;
    el.innerHTML=days.map(d=>`<div class="mini-day-head">${d}</div>`).join('');
    const first=new Date(miniYear,miniMonth,1).getDay();
    const offset=(first===0?6:first-1);
    const daysInMonth=new Date(miniYear,miniMonth+1,0).getDate();
    const prevDays=new Date(miniYear,miniMonth,0).getDate();
    for(let i=offset-1;i>=0;i--){
      el.innerHTML+=`<div class="mini-day other-month">${prevDays-i}</div>`;
    }
    const now=new Date();
    for(let d=1;d<=daysInMonth;d++){
      const dateStr=`${miniYear}-${pad2(miniMonth+1)}-${pad2(d)}`;
      const isToday=now.getDate()===d&&now.getMonth()===miniMonth&&now.getFullYear()===miniYear;
      const hasEv=eventsByDate[dateStr];
      el.innerHTML+=`<div class="mini-day${isToday?' today':''}${hasEv?' has-event':''}" onclick="jumpToDate(${miniYear},${miniMonth})">${d}</div>`;
    }
    const remaining=(7-((offset+daysInMonth)%7))%7;
    for(let d=1;d<=remaining;d++) el.innerHTML+=`<div class="mini-day other-month">${d}</div>`;
  }

  function changeMonth(dir){miniMonth+=dir;if(miniMonth>11){miniMonth=0;miniYear++;}else if(miniMonth<0){miniMonth=11;miniYear--;}renderMiniCal();}
  function jumpToDate(y,m){ currentYear=y; currentMonth=m; renderMainCal(); switchView('month'); }

  function renderMainCal(){
    const el=document.getElementById('monthBody');
    document.getElementById('mainCalTitle').textContent=months[currentMonth]+' '+currentYear;
    el.innerHTML='';
    const first=new Date(currentYear,currentMonth,1).getDay();
    const offset=(first===0?6:first-1);
    const daysInMonth=new Date(currentYear,currentMonth+1,0).getDate();
    const prevDays=new Date(currentYear,currentMonth,0).getDate();
    const now=new Date();
    for(let i=offset-1;i>=0;i--){
      el.innerHTML+=`<div class="month-cell other"><div class="cell-date" style="color:var(--border)">${prevDays-i}</div></div>`;
    }
    for(let d=1;d<=daysInMonth;d++){
      const dateStr=`${currentYear}-${pad2(currentMonth+1)}-${pad2(d)}`;
      const isToday=now.getDate()===d&&now.getMonth()===currentMonth&&now.getFullYear()===currentYear;
      const dayEvents=eventsByDate[dateStr]||[];
      let evHtml=dayEvents.slice(0,2).map(e=>`<div class="cell-event" style="background:${e.bg};color:${e.color}" onclick="event.stopPropagation();showEventPopupFor(event,'${e.id}')">${e.title}</div>`).join('');
      if(dayEvents.length>2) evHtml+=`<div style="font-size:.65rem;color:var(--gray);padding:.1rem .3rem">+${dayEvents.length-2} autres</div>`;
      el.innerHTML+=`<div class="month-cell${isToday?' today-cell':''}"><div class="cell-date">${d}</div>${evHtml}</div>`;
    }
    const total=offset+daysInMonth;
    const remaining=(7-(total%7))%7;
    for(let d=1;d<=remaining;d++) el.innerHTML+=`<div class="month-cell other"><div class="cell-date" style="color:var(--border)">${d}</div></div>`;

    renderList();
  }

  function renderList(){
    const el=document.getElementById('listEvents');
    el.innerHTML='';
    const prefix = `${currentYear}-${pad2(currentMonth+1)}`;
    const sorted=Object.entries(eventsByDate).filter(([k])=>k.startsWith(prefix)).sort(([a],[b])=>a.localeCompare(b));
    sorted.forEach(([date,evs])=>{
      const d=new Date(date+'T00:00:00');
      const label=d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
      el.innerHTML+=`<div style="padding:.6rem 1.25rem;background:#F8FAFC;border-bottom:1px solid var(--border);font-size:.78rem;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.04em">${label}</div>`;
      evs.forEach(e=>{
        el.innerHTML+=`<div style="display:flex;align-items:center;gap:1rem;padding:.75rem 1.25rem;border-bottom:1px solid var(--border);cursor:pointer;transition:background .2s" onmouseover="this.style.background='#F8FAFC'" onmouseout="this.style.background='white'" onclick="showEventPopupFor(event,'${e.id}')"><div style="width:12px;height:12px;border-radius:3px;background:${e.color};flex-shrink:0"></div><div style="flex:1"><div style="font-size:.85rem;font-weight:600">${e.title}</div><div style="font-size:.72rem;color:var(--gray);margin-top:.1rem">⏰ ${e.time}</div></div></div>`;
      });
    });
    if(!sorted.length) el.innerHTML='<div style="text-align:center;padding:2rem;color:var(--gray);font-size:.85rem">Aucun événement ce mois-ci</div>';
  }

  function renderWeek(){
    const el=document.getElementById('weekBody');
    el.innerHTML='';
    const times=['07h','08h','09h','10h','11h','12h','13h','14h','15h','16h','17h','18h'];

    // Semaine réelle (lundi -> dimanche) contenant aujourd'hui
    const now=new Date();
    const dow=(now.getDay()===0?6:now.getDay()-1);
    const monday=new Date(now); monday.setDate(now.getDate()-dow);
    const weekDates=[...Array(7)].map((_,i)=>{ const d=new Date(monday); d.setDate(monday.getDate()+i); return d; });

    weekDates.forEach((d,i)=>{
      const label=document.getElementById('whd-'+i);
      label.textContent = `${pad2(d.getDate())} ${months[d.getMonth()].slice(0,3)}`;
      label.classList.toggle('today', dateKey(d)===dateKey(now));
    });

    const dayEvents = weekDates.map(d => (eventsByDate[dateKey(d)]||[]).filter(e => e.start_time));

    times.forEach((t,ti)=>{
      el.innerHTML+=`<div class="week-time">${t}</div>`;
      const hour = 7+ti;
      for(let d=0;d<7;d++){
        const ev=dayEvents[d].find(e=> parseInt(e.start_time.slice(0,2),10)===hour);
        let evHtml='';
        if(ev) evHtml=`<div class="slot-event" style="background:${ev.bg};color:${ev.color};border-left:3px solid ${ev.color}" onclick="event.stopPropagation();showEventPopupFor(event,'${ev.id}')">${ev.title}</div>`;
        el.innerHTML+=`<div class="week-slot">${evHtml}</div>`;
      }
    });
  }

  function changeMainMonth(dir){currentMonth+=dir;if(currentMonth>11){currentMonth=0;currentYear++;}else if(currentMonth<0){currentMonth=11;currentYear--;}renderMainCal();}
  function goToday(){const t=new Date();currentYear=t.getFullYear();currentMonth=t.getMonth();renderMainCal();}

  function switchView(v){
    ['month','week','list'].forEach(vv=>{document.getElementById('view-'+vv).classList.remove('active');document.getElementById('btn'+vv.charAt(0).toUpperCase()+vv.slice(1)).classList.remove('active');});
    document.getElementById('view-'+v).classList.add('active');
    document.getElementById('btn'+v.charAt(0).toUpperCase()+v.slice(1)).classList.add('active');
    if(v==='week')renderWeek();
  }

  // ── Popup détail événement (réel) ──
  function showEventPopupFor(e,eventId){
    const ev = allEvents.find(x => x.id === eventId);
    if (!ev) return;
    activePopupEventId = eventId;
    const meta = TYPE_META[ev.type] || TYPE_META['Événement'];
    const popup=document.getElementById('eventPopup');
    document.getElementById('popupBar').style.background=meta.color;
    document.getElementById('popupTitle').textContent=`${meta.icon} ${ev.title}`;
    const d1=new Date(ev.start_date+'T00:00:00');
    const dateLabel = ev.start_date===ev.end_date
      ? d1.toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'})
      : `${d1.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'})} → ${new Date(ev.end_date+'T00:00:00').toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'})}`;
    const timeLabel = ev.start_time ? `${fmtHM(ev.start_time)}–${fmtHM(ev.end_time)}` : 'Journée';
    document.getElementById('popupMeta').innerHTML =
      `<span>📅 ${dateLabel} · ${timeLabel}</span>${ev.location?`<span>📍 ${ev.location}</span>`:''}${ev.audience?`<span>👥 ${ev.audience}</span>`:''}${ev.description?`<span>${ev.description}</span>`:''}`;
    document.getElementById('popupActions').style.display = (me.role==='admin'||me.role==='superadmin') ? 'flex' : 'none';
    const x=Math.min(e.clientX,window.innerWidth-300);
    const y=Math.min(e.clientY,window.innerHeight-200);
    popup.style.left=x+'px';popup.style.top=y+'px';
    popup.classList.add('show');
    e.stopPropagation();
  }
  function closePopup(){document.getElementById('eventPopup').classList.remove('show');activePopupEventId=null;}
  document.addEventListener('click',()=>closePopup());

  async function deleteEvent(){
    if (!activePopupEventId) return;
    const { error } = await supabaseClient.from('calendar_events').delete().eq('id', activePopupEventId);
    closePopup();
    if (error) { showToast('⚠️ ' + error.message); return; }
    showToast('🗑️ Événement supprimé');
    await loadCalendarEvents();
  }

  // ── Modal création (réel) ──
  function openModal(){
    document.getElementById('ev_titre').value='';
    document.getElementById('ev_type').value='Cours';
    const todayStr = dateKey(new Date());
    document.getElementById('ev_debut').value = todayStr;
    document.getElementById('ev_fin').value = todayStr;
    document.getElementById('ev_heure_debut').value='08:00';
    document.getElementById('ev_heure_fin').value='10:00';
    document.getElementById('ev_lieu').value='';
    document.getElementById('ev_audience').value='Tous';
    document.getElementById('ev_description').value='';
    document.getElementById('eventFormError').style.display='none';
    document.getElementById('eventModal').classList.add('active');document.body.style.overflow='hidden';
  }
  function closeModal(){document.getElementById('eventModal').classList.remove('active');document.body.style.overflow='';}

  async function submitEvent(){
    const errBox = document.getElementById('eventFormError');
    errBox.style.display = 'none';

    const title = document.getElementById('ev_titre').value.trim();
    const type = document.getElementById('ev_type').value;
    const start_date = document.getElementById('ev_debut').value;
    const end_date = document.getElementById('ev_fin').value || start_date;
    const allDay = type === 'Vacances';
    const start_time = allDay ? null : document.getElementById('ev_heure_debut').value;
    const end_time = allDay ? null : document.getElementById('ev_heure_fin').value;
    const location = document.getElementById('ev_lieu').value.trim() || null;
    const audience = document.getElementById('ev_audience').value.trim() || 'Tous';
    const description = document.getElementById('ev_description').value.trim() || null;

    if (!title || !start_date || end_date < start_date) {
      errBox.textContent = '⚠️ Titre et dates valides sont obligatoires.';
      errBox.style.display = 'block';
      return;
    }

    const btn = document.getElementById('ev_submit');
    btn.disabled = true;
    const { error } = await supabaseClient.from('calendar_events').insert({
      university: me.university, title, type, start_date, end_date, start_time, end_time,
      location, audience, description, created_by: me.id
    });
    btn.disabled = false;

    if (error) { errBox.textContent = '⚠️ ' + error.message; errBox.style.display = 'block'; return; }

    closeModal();
    showToast('✅ Événement créé et publié !');
    await loadCalendarEvents();
  }

  let tt;
  function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),3000);}

  document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closePopup();}});

  const ROLE_HOME = { admin:'dashboard.html', enseignant:'enseignant.html', etudiant:'etudiant.html', superadmin:'superadmin.html', parent:'parents.html' };

  window.authReady.then(async user => {
    if (!user) return;
    me = user;
    document.getElementById('backLink').href = ROLE_HOME[user.role] || 'login.html';
    if (user.role === 'admin' || user.role === 'superadmin') document.getElementById('btnAddEvent').style.display = '';
    await loadCalendarEvents();
  });
</script>
</body>
